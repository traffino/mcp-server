name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: traffino/mcp
  # docker/* actions are still Node 20 (no v4 major yet). Opt in until they release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [aggregator, aws, aws-docs, brave, bunq, cloudflare, discord, docker, drawio, github, hetzner, memory, ms365, personal]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.server }}.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.server }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.server }}
          cache-to: type=gha,scope=${{ matrix.server }},mode=max
